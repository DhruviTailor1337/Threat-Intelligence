input {
  mongodb {
    uri => "mongodb://mongodb:27017/threat_intelligence"
    placeholder_db_dir => "/tmp/logstash_placeholder"
    placeholder_db_name => "logstash_sqlite.db"
    collection => "indicators"
    batch_size => 500
    generateId => true
  }
}

filter {
  mutate {
    rename => { "_id" => "mongo_id" }
  }
  date {
    match => ["last_seen", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "threat-indicators"
    document_id => "%{mongo_id}"
  }
  stdout { codec => rubydebug }
}
